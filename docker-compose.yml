version: "3.9"

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  db_data:
    driver: local
  app_logs:
    driver: local

services:

  mysql:
    image: mysql:8.0
    container_name: epicbook-mysql
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --skip-ssl
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - backend-net
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  epicbook:
    build:
      context: ./epicbook
      dockerfile: Dockerfile
    container_name: epicbook-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:    production
      DB_HOST:     mysql
      DB_PORT:     "3306"
      DB_NAME:     ${MYSQL_DATABASE}
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - app_logs:/app/logs
    networks:
      - frontend-net
      - backend-net
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 60s

  nginx:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: epicbook-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./logs/nginx:/var/log/nginx
    networks:
      - frontend-net
    depends_on:
      epicbook:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout:  3s
      retries:  3
